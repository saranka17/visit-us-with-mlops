name: Visit With Us MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: visit-with-us-main
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  register-dataset:
    name: Register Raw Dataset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Upload raw dataset to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          DATASET_REPO_ID: ${{ vars.DATASET_REPO_ID }}
        run: python visit-with-us-mlops/src/register_data.py

  data-preparation:
    name: Prepare Cleaned Dataset
    runs-on: ubuntu-latest
    needs: register-dataset

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r visit-with-us-mlops/requirements.txt

      - name: Run data preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          DATASET_REPO_ID: ${{ vars.DATASET_REPO_ID }}
        run: python visit-with-us-mlops/src/prepare_data.py

  model-training:
    name: Train And Register Model
    runs-on: ubuntu-latest
    needs: data-preparation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r visit-with-us-mlops/requirements.txt

      - name: Run model training with MLflow tracking
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          DATASET_REPO_ID: ${{ vars.DATASET_REPO_ID }}
          MODEL_REPO_ID: ${{ vars.MODEL_REPO_ID }}
        run: python visit-with-us-mlops/src/train_model.py

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-training-artifacts
          path: |
            visit-with-us-mlops/artifacts/random_forest_model
            visit-with-us-mlops/mlruns
          if-no-files-found: warn

  deploy-space:
    name: Deploy To Hugging Face Space
    runs-on: ubuntu-latest
    needs: model-training

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r visit-with-us-mlops/requirements.txt

      - name: Validate deployment files
        run: |
          test -f visit-with-us-mlops/deployment/Dockerfile
          test -f visit-with-us-mlops/deployment/app.py
          test -f visit-with-us-mlops/deployment/requirements.txt
          test -f visit-with-us-mlops/deployment/README.md

      - name: Push deployment files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          SPACE_REPO_ID: ${{ vars.SPACE_REPO_ID }}
        run: python visit-with-us-mlops/src/deploy_space.py
